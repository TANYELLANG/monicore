<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONICORE — Sign In</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: var(--content-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }
    .login-wrap { width: 100%; max-width: 440px; padding: 20px; }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: var(--gold);
      letter-spacing: 4px;
    }
    .login-brand-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-brand">
    <div class="login-brand-name">MONICORE</div>
    <div class="login-brand-sub">8 Newtown Boulevard</div>
  </div>

  <div class="mc-panel">
    <div class="mc-panel-head">
      <span style="font-family:'DM Serif Display',serif; font-size:18px; font-weight:400;">Welcome back</span>
      <span style="font-size:13px; color:var(--text-muted);">Please sign in to continue</span>
    </div>

    {% if messages %}
      <div style="padding:12px 24px 0;">
        {% for message in messages %}
          <div class="mc-alert mc-alert-{{ message.tags }}" style="margin-bottom:0;">
            <i class="bi bi-{% if message.tags == 'success' %}check-circle{% else %}exclamation-circle{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}"
          style="padding:24px; display:flex; flex-direction:column; gap:16px;">
      {% csrf_token %}

      <div class="mc-form-group">
        <label class="mc-label">Full Name or Email</label>
        <input class="mc-input mc-input--full" type="text"
               name="username" autofocus required
               placeholder="Enter your full name or email">
        <small style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
          Use your full name (e.g., John Smith) or email address
        </small>
      </div>

      <div class="mc-form-group">
        <label class="mc-label">Password</label>
        <input class="mc-input mc-input--full" type="password"
               name="password" required
               placeholder="Enter your password">
      </div>

      <button class="mc-btn mc-btn--gold" type="submit"
              style="width:100%; justify-content:center; margin-top:4px;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>

    </form>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
